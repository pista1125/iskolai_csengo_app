<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Bell - Modern Neon Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#030712">
  </head>
  <body>
    <div id="app">
      <div class="glass-container">
        <!-- Main Status Card -->
        <div class="glass-card hero-card">
          <div class="hero-header">
            <div class="badge">AKTÍV ÜZEMMÓD: <span id="mode-status">AUTOMATIKUS</span></div>
          </div>
          
          <div class="clock-section">
            <div id="current-clock" class="digital-clock">00:00:00</div>
            <div id="current-date" class="date-footer">2026. MÁRCIUS 26. CSÜTÖRTÖK</div>
          </div>

          <div class="status-center">
            <div class="status-label">KÖVETKEZŐ CSENGŐ</div>
            <div class="glow-box">
              <div id="next-bell" class="next-time">--:--</div>
              <div class="sub-status" id="bell-status-text">ÜTEMEZÉS SZERINT</div>
            </div>
          </div>

          <div class="control-section">
            <h3 class="section-title">BEÁLLÍTÁSOK & VEZÉRLÉS</h3>
            
            <div class="settings-list">
              <div class="setting-row">
                <div class="setting-text">
                  <span class="label">HÉTVÉGI CSENGETÉS</span>
                  <span class="desc">Hétvégi csengetés engedélyezése</span>
                </div>
                <label class="switch">
                  <input type="checkbox" id="weekend-ringing">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="main-actions">
              <button class="btn btn-neon-red" id="manual-ring-btn">
                <i data-lucide="bell"></i> MANUÁLIS CSENGETÉS
              </button>
              <button class="btn btn-neon-green" id="mic-toggle-btn">
                <i data-lucide="mic"></i> MIKROFON ADÁS
              </button>
            </div>
          </div>
        </div>

        <!-- Sidebar / Secondary Controls -->
        <div class="side-controls">
          <div class="glass-card compact">
            <h3><i data-lucide="clock"></i> IDŐZÍTÉS</h3>
            <div class="input-group">
              <label>Becsengetés</label>
              <div class="input-row">
                <input type="time" id="in-bell-time">
                <button class="btn-icon" id="add-in-bell"><i data-lucide="plus"></i></button>
              </div>
            </div>
            <div class="input-group">
              <label>Kicsengetés</label>
              <div class="input-row">
                <input type="time" id="out-bell-time">
                <button class="btn-icon" id="add-out-bell"><i data-lucide="plus"></i></button>
              </div>
            </div>
            <div class="input-group">
              <label>Időtartam (mp)</label>
              <input type="number" id="bell-duration" value="10" min="1" max="120">
            </div>
          </div>

          <div class="glass-card compact">
            <h3><i data-lucide="settings"></i> ESZKÖZÖK</h3>
            <select id="audio-output-select"><option value="default">Kimenet: Alapértelmezett</option></select>
            <select id="audio-input-select"><option value="default">Bemenet: Alapértelmezett</option></select>
            <button class="btn btn-outline" id="refresh-devices-btn">Frissítés</button>
          </div>

          <div class="glass-card compact">
            <h3><i data-lucide="music"></i> HANGOK ÉS CSENGŐK</h3>
            <div class="audio-control-stack">
               <div class="audio-slot">
                 <div class="slot-header">
                   <span class="badge-mini">BE</span>
                   <span id="in-bell-name" class="current-track">Nincs kiválasztva</span>
                 </div>
                 <div class="slot-controls">
                   <select id="in-preset-select" class="preset-select">
                     <option value="custom">-- Egyéni feltöltés --</option>
                   </select>
                   <label class="btn-upload">
                     <i data-lucide="upload"></i>
                     <input type="file" id="in-bell-file" hidden>
                   </label>
                 </div>
               </div>

               <div class="audio-slot">
                 <div class="slot-header">
                   <span class="badge-mini danger">KI</span>
                   <span id="out-bell-name" class="current-track">Nincs kiválasztva</span>
                 </div>
                 <div class="slot-controls">
                   <select id="out-preset-select" class="preset-select">
                     <option value="custom">-- Egyéni feltöltés --</option>
                   </select>
                   <label class="btn-upload">
                     <i data-lucide="upload"></i>
                     <input type="file" id="out-bell-file" hidden>
                   </label>
                 </div>
               </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Schedule List -->
      <div class="glass-card list-card">
        <h3><i data-lucide="list"></i> NAPI ÜTEMTERV</h3>
        <div id="schedule-rows" class="schedule-grid"></div>
      </div>

      <!-- Emergency -->
      <button class="btn btn-danger btn-pulse emergency-btn" id="fire-alarm-btn">
        <i data-lucide="flame"></i> TŰZRIASZTÁS
      </button>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
